name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Install libpcap
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev
      - run: cargo clippy --workspace --exclude netscope-desktop -- -D warnings
      - run: cargo fmt --check

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install libpcap (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Install Npcap SDK (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-sdk-1.13.zip" -OutFile "$env:TEMP\npcap-sdk.zip" -UseBasicParsing
          Expand-Archive -Path "$env:TEMP\npcap-sdk.zip" -DestinationPath "$env:TEMP\npcap-sdk" -Force
          echo "LIBPCAP_LIBDIR=$env:TEMP\npcap-sdk\Lib\x64" | Out-File -FilePath $env:GITHUB_ENV -Append

      - run: cargo build -p netscope-core -p netscope-tui
      - run: cargo test -p netscope-core -p netscope-tui

  # Desktop frontend unit tests (vitest) — run the shipped app.js/filter.js
  # sources in a sandbox, no build step required.
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/frontend-tests/package-lock.json
      - run: npm ci
        working-directory: desktop/frontend-tests
      - run: npm test
        working-directory: desktop/frontend-tests

  # Continuous benchmarks (ROADMAP §4.4). Quick mode keeps the job fast; the
  # numbers land in the job log so regressions are visible in review.
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install libpcap
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev
      - name: Parse & filter benchmarks (quick mode)
        run: |
          cargo bench -p netscope-core --bench parse_throughput -- --quick
          cargo bench -p netscope-core --bench filter_match -- --quick
      - name: Memory footprint (200k packets)
        run: MEM_PACKETS=200000 cargo bench -p netscope-core --bench mem_usage
