name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# Jobs:
#   1. lint        — cargo clippy (deny warnings) + cargo fmt --check
#   2. test        — cargo test on Linux / macOS / Windows
#   3. frontend    — npm test (vitest) for desktop frontend unit tests
#   4. bench       — continuous benchmarks (parse, filter, memory)
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Clippy + Rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Install libpcap-dev
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Clippy (all workspace crates except desktop)
        run: cargo clippy --workspace --exclude netscope-desktop -- -D warnings

      - name: Rustfmt
        run: cargo fmt --check

  # ── 2. Rust tests (matrix: Linux, macOS, Windows) ─────────────────────────
  test:
    name: Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Platform-specific packet capture library setup
      - name: Install libpcap-dev (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Install Npcap SDK (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Download and extract the Npcap SDK so the `pcap` crate can link
          $sdkUrl  = "https://npcap.com/dist/npcap-sdk-1.13.zip"
          $zipPath = "$env:TEMP\npcap-sdk.zip"
          $sdkDir  = "$env:TEMP\npcap-sdk"
          Invoke-WebRequest -Uri $sdkUrl -OutFile $zipPath -UseBasicParsing
          Expand-Archive -Path $zipPath -DestinationPath $sdkDir -Force
          # Expose LIB so the linker finds Packet.lib / wpcap.lib
          $libDir = "$sdkDir\Lib\x64"
          echo "LIB=$libDir;$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "LIBPCAP_LIBDIR=$libDir"| Out-File -FilePath $env:GITHUB_ENV -Append

      # Build & test the core + TUI crates. The desktop crate is built and
      # tested separately below rather than added here — see that step.
      - name: Build
        run: cargo build -p netscope-core -p netscope-tui

      - name: Test
        run: cargo test -p netscope-core -p netscope-tui

      # The desktop crate's tests exercise `replay_packet`, which puts real
      # packets on the wire, so they are worth running. Linux is skipped
      # because Tauri needs seven apt packages there (libwebkit2gtk and
      # friends — see release.yml), which is a lot of setup time on every push
      # for two tests. Windows and macOS need nothing extra.
      #
      # This used to be impossible to fold into the line above: on Windows the
      # desktop test binary died with STATUS_ENTRYPOINT_NOT_FOUND before `main`
      # ran, because it had no application manifest requesting comctl32
      # version 6. `build.rs` now links the manifest resource into test targets
      # too, so `cargo test --workspace` works — see the comment there.
      - name: Test desktop
        if: runner.os != 'Linux'
        run: cargo test -p netscope-desktop

  # ── 3. Frontend tests (vitest) ─────────────────────────────────────────────
  frontend:
    name: Frontend (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/frontend-tests/package-lock.json

      # Build the WASM filter module — frontend tests load it at runtime
      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.126

      - name: Build WASM filter module
        run: |
          cargo build -p netscope-wasm --release --target wasm32-unknown-unknown
          wasm-bindgen \
            --target web \
            --out-dir desktop/frontend/wasm \
            target/wasm32-unknown-unknown/release/netscope_wasm.wasm

      - name: Install npm dependencies
        run: npm ci
        working-directory: desktop/frontend-tests

      - name: Run frontend tests
        run: npm test
        working-directory: desktop/frontend-tests

  # ── 4. Benchmarks (quick mode) ─────────────────────────────────────────────
  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install libpcap-dev
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Parse & filter benchmarks (quick mode)
        run: |
          cargo bench -p netscope-core --bench parse_throughput -- --quick
          cargo bench -p netscope-core --bench filter_match -- --quick

      - name: Memory footprint (200k packets)
        run: MEM_PACKETS=200000 cargo bench -p netscope-core --bench mem_usage
