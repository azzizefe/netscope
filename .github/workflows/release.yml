name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  tui:
    name: TUI (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: netscope-tui
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: netscope-tui
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: netscope-tui
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: netscope-tui.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            binary: netscope-tui.exe
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install libpcap (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcap-dev
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          fi

      - name: Install Npcap SDK (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-sdk-1.13.zip" -OutFile "$env:TEMP\npcap-sdk.zip" -UseBasicParsing
          Expand-Archive -Path "$env:TEMP\npcap-sdk.zip" -DestinationPath "$env:TEMP\npcap-sdk" -Force
          $libDir = if ("${{ matrix.target }}" -eq "aarch64-pc-windows-msvc") { "$env:TEMP\npcap-sdk\Lib\ARM64" } else { "$env:TEMP\npcap-sdk\Lib\x64" }
          if (-not (Test-Path $libDir)) { $libDir = "$env:TEMP\npcap-sdk\Lib\x64" }
          echo "LIBPCAP_LIBDIR=$libDir" | Out-File -FilePath $env:GITHUB_ENV -Append

      - run: cargo build -p netscope-tui --release --target ${{ matrix.target }}

      # Code signing template for EV certificate (ROADMAP §8.3)
      - name: Code Sign Binary (Windows EV Cert)
        if: runner.os == 'Windows' && env.SIGNING_CERTIFICATE_PFX != ''
        shell: pwsh
        run: |
          # Example using signtool with EV Cert from GitHub Secrets
          # signtool sign /f "$env:SIGNING_CERTIFICATE_PFX" /p "$env:SIGNING_CERTIFICATE_PASSWORD" /tr http://timestamp.digicert.com /td sha256 /fd sha256 target/${{ matrix.target }}/release/${{ matrix.binary }}
          Write-Host "Code signing placeholder run completed for Windows EV Certificate."

      - name: Notarize Binary (macOS Apple Developer EV Cert)
        if: runner.os == 'macOS' && env.APPLE_DEVELOPER_IDENTITY != ''
        run: |
          # codesign -s "$APPLE_DEVELOPER_IDENTITY" --timestamp target/${{ matrix.target }}/release/${{ matrix.binary }}
          echo "Notarization placeholder run completed for macOS."

      - name: Upload TUI binary
        uses: actions/upload-artifact@v4
        with:
          name: netscope-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}
          if-no-files-found: error

  desktop:
    name: Desktop (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
            bundles: "deb,appimage"
          - os: macos-latest
            name: macOS
            bundles: "dmg"
          - os: windows-latest
            name: Windows
            bundles: "nsis,msi"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libpcap-dev

      - name: Install Npcap SDK (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-sdk-1.13.zip" -OutFile "$env:TEMP\npcap-sdk.zip" -UseBasicParsing
          Expand-Archive -Path "$env:TEMP\npcap-sdk.zip" -DestinationPath "$env:TEMP\npcap-sdk" -Force
          echo "LIBPCAP_LIBDIR=$env:TEMP\npcap-sdk\Lib\x64" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install Tauri CLI
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli@2

      # Derive the package version from the pushed tag (e.g. v1.2.3 -> 1.2.3)
      # so the produced installers carry the release version without any manual
      # bump of tauri.conf.json. Runs on every OS via bash (available on all runners).
      - name: Derive version from tag
        shell: bash
        working-directory: desktop/src-tauri
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building version: $VERSION"
          echo "{\"version\": \"$VERSION\"}" > version.conf.json

      - name: Build desktop
        run: cargo tauri build --ci --bundles "${{ matrix.bundles }}" --config version.conf.json
        working-directory: desktop/src-tauri

      - name: Upload desktop bundle
        uses: actions/upload-artifact@v4
        with:
          name: netscope-desktop-${{ matrix.name }}
          path: |
            desktop/src-tauri/target/release/bundle/**
          if-no-files-found: warn

      - name: Find bundle fallback
        if: failure()
        shell: pwsh
        run: |
          Write-Host "Searching for bundle artifacts..."
          Get-ChildItem -Path "${{ github.workspace }}" -Recurse -Include "*.deb","*.AppImage","*.dmg","*.exe","*.msi" -ErrorAction SilentlyContinue | Select-Object FullName, Length

  release:
    name: Create Release
    needs: [tui, desktop]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: List downloaded artifacts
        run: find . -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            netscope-x86_64-unknown-linux-gnu/netscope-tui
            netscope-aarch64-unknown-linux-gnu/netscope-tui
            netscope-aarch64-apple-darwin/netscope-tui
            netscope-x86_64-pc-windows-msvc/netscope-tui.exe
            netscope-aarch64-pc-windows-msvc/netscope-tui.exe
            netscope-desktop-Linux/**
            netscope-desktop-macOS/**
            netscope-desktop-Windows/**
          generate_release_notes: true
          fail_on_unmatched_files: false
